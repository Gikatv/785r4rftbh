{% extends 'base.html' %}{% block content %}<div class="top"><h1>Broadcast</h1><a class="btn btn2" href="/">Back</a></div><div class="table-card"><form method="post"><textarea name="message" rows="6" placeholder="Broadcast message" required></textarea><p><select name="target"><option value="users">Users only</option><option value="groups">Groups only</option><option value="all">Users + Groups</option></select></p><button class="btn">Send Broadcast</button></form>{% if result %}<p class="ok">{{result}}</p>{% endif %}</div><div class="table-card"><h2>History</h2><table><tr><th>Message</th><th>Sent</th><th>Failed</th><th>Date</th></tr>{% for r in rows %}<tr><td>{{r.message}}</td><td>{{r.sent_count}}</td><td>{{r.failed_count}}</td><td>{{r.created_at}}</td></tr>{% endfor %}</table></div>{% endblock %}
