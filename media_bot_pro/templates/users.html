{% extends 'base.html' %}{% block content %}<div class="top"><h1>Users & Download Limits</h1><a class="btn btn2" href="/">Back</a></div><div class="table-card"><table><tr><th>User</th><th>Name</th><th>Today</th><th>Total</th><th>Limit</th><th>Action</th></tr>{% for u in users %}<tr><td>{{u.user_id}}<br>@{{u.username}}</td><td>{{u.first_name}}</td><td>{{u.downloads_today}}</td><td>{{u.total_downloads}}</td><td><form method="post" action="/users/update" class="row"><input type="hidden" name="user_id" value="{{u.user_id}}"><input class="input" name="limit_value" value="{{u.limit_value}}" placeholder="unlimited or number"><button class="btn">Save</button></form></td><td><form method="post" action="/users/delete"><input type="hidden" name="user_id" value="{{u.user_id}}"><button class="btn danger">Delete</button></form></td></tr>{% endfor %}</table></div>{% endblock %}
