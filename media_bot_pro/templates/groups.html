{% extends 'base.html' %}{% block content %}<div class="top"><h1>Allowed Groups</h1><a class="btn btn2" href="/">Back</a></div><div class="table-card"><h2>Add Group</h2><form class="row" method="post" action="/groups/add"><input class="input" name="chat_id" placeholder="Group Chat ID e.g. -1001234567890" required><input class="input" name="title" placeholder="Group Name"><button class="btn">Add Group</button></form><p class="muted">Group ID එක ගන්න bot එක group එකට add කරලා message එකක් දාලා logs බලන්න.</p></div><div class="table-card"><table><tr><th>Chat ID</th><th>Title</th><th>Created</th><th>Action</th></tr>{% for g in groups %}<tr><td>{{g.chat_id}}</td><td>{{g.title}}</td><td>{{g.created_at}}</td><td><form method="post" action="/groups/delete"><input type="hidden" name="chat_id" value="{{g.chat_id}}"><button class="btn danger">Delete</button></form></td></tr>{% endfor %}</table></div>{% endblock %}
